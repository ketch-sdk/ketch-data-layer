name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        node-version:
          - 20.x
          - 22.x

    name: Node ${{ matrix.node-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup npmrc for ketch-com
        uses: conventional-actions/setup-npmrc@1249e413feee16148d8bf9360166202ce428da82 # v1
        with:
          always-auth: true
          scope: ketch-com
          token: ${{ secrets.GH_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Run all targets
        run: npm run all

  release:
    needs: build

    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Generate next version
        id: version
        uses: conventional-actions/next-version@1b3e4803a0bdf7435ba7bb5ace077445ed54e82a # v1.1.8

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup npmrc for ketch-com
        uses: conventional-actions/setup-npmrc@1249e413feee16148d8bf9360166202ce428da82 # v1
        with:
          always-auth: true
          scope: ketch-com
          token: ${{ secrets.GH_TOKEN }}

      - name: Set package version
        uses: conventional-actions/write-version@77c6c9d20094108d23984deb1af56dd730166bd8 # v1
        with:
          output_path: package.json
          version: ${{ format('{0}.{1}.{2}', steps.version.outputs.version-major-only, steps.version.outputs.version-minor-only, steps.version.outputs.version-patch-only) }}

      - name: Install dependencies
        run: npm ci

      - name: Run all targets
        run: npm run all

      - name: Publish (npmjs) via Trusted Publishing
        run: |
          unset NPM_CONFIG_USERCONFIG
          npm publish --provenance --access public --registry https://registry.npmjs.org/

      - name: Create Release
        uses: conventional-actions/create-release@c025b7306d14a25901b72486f97f3ebe7662a8ed # v1.0.31
        with:
          tag_name: ${{ steps.version.outputs.version }}
          artifacts: "*"

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
